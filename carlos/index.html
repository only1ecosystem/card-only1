<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Carlos · only1.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS only1. v3.1 (ajusta a tus hex exactos) ───────────── */
  :root{
    --noir:#151515;--noir-2:#1F1F1F;
    --cream:#FAFAF8;--cream-dim:#909090;
    --wine:#A0223E;--wine-hi:#c02a4e;
    --line:rgba(250,250,248,0.13);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--noir);color:var(--cream);
    font-family:"Poppins",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    padding:max(24px,env(safe-area-inset-top)) 22px max(28px,env(safe-area-inset-bottom));
  }
  .card{width:100%;max-width:430px;display:flex;flex-direction:column}

  .top{display:flex;align-items:center;justify-content:space-between}
  .wordmark{font-size:26px;font-weight:800;letter-spacing:-.04em}
  .wordmark b{color:var(--wine)}
  .status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--cream-dim)}
  .dot{width:7px;height:7px;border-radius:50%;background:#3ecf7e;animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(62,207,126,.45)}70%{box-shadow:0 0 0 7px rgba(62,207,126,0)}100%{box-shadow:0 0 0 0 rgba(62,207,126,0)}}

  .body{padding:38px 0 8px}
  .name{font-size:40px;line-height:1.02;font-weight:600;letter-spacing:-.035em}
  .role{margin-top:10px;font-size:14px;color:var(--cream-dim);letter-spacing:.04em;text-transform:uppercase}
  .pitch{margin-top:24px;font-size:19px;line-height:1.4;max-width:22ch;min-height:2.8em;font-weight:400}
  .caret{display:inline-block;width:2px;height:1em;background:var(--wine);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .actions{display:flex;flex-direction:column;gap:12px;margin-top:30px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;height:58px;border-radius:15px;font-size:16px;font-weight:600;text-decoration:none;letter-spacing:-.01em;transition:transform .12s ease,background .15s ease,border-color .15s ease}
  .btn:active{transform:scale(.985)}
  .btn-wa{background:var(--wine);color:var(--cream)}
  .btn-wa:hover{background:var(--wine-hi)}
  .btn-save{background:transparent;color:var(--cream);border:1px solid var(--line)}
  .btn-save:hover{border-color:var(--cream-dim)}
  .btn svg{width:20px;height:20px;flex:none}

  .links{display:flex;gap:8px;margin-top:20px}
  .links a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 6px;border-radius:12px;background:var(--noir-2);color:var(--cream-dim);text-decoration:none;font-size:13px;font-weight:500;transition:color .15s ease}.links a svg{width:14px;height:14px;flex:none}
  .links a:hover{color:var(--cream)}

  /* ── Clientes estilo Instagram ───────────────────────────────── */
  .clients{margin-top:34px}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-dim);display:flex;align-items:center;gap:8px;margin-bottom:18px}
  .eyebrow svg{width:15px;height:15px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 8px}
  .client{display:flex;flex-direction:column;align-items:center;gap:9px;text-decoration:none}
  .avatar{width:64px;height:64px;border-radius:50%;padding:2.5px;background:conic-gradient(from 215deg,var(--wine),#b8860b,var(--wine));display:flex;transition:transform .12s ease}
  .avatar i{flex:1;border-radius:50%;background:var(--noir-2);border:2.5px solid var(--noir);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;font-style:normal;color:var(--cream);overflow:hidden}
  .avatar i img{width:100%;height:100%;object-fit:cover}
  .client small{font-size:10.5px;color:var(--cream-dim);text-align:center;line-height:1.25;overflow-wrap:anywhere}
  .client:active .avatar{transform:scale(.95)}

  footer{margin-top:32px;font-size:11px;color:var(--cream-dim);letter-spacing:.06em;text-align:center;opacity:.7}
  @media (prefers-reduced-motion:reduce){.caret{display:none}.dot{animation:none}}
</style>
</head>
